<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dynamische Tarife</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Chart.js (muss vor app.js geladen sein) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
  <div class="shell">
    <div class="card">
      <h2>Dynamische Stromtarife</h2>

      <div class="controls">
        <label>
          Datum:
          <input id="date" type="date" />
        </label>

        <button id="load" class="primary" type="button">Werte laden</button>
        <button id="today" type="button">Heute</button>
        <button id="prev" type="button">◀︎</button>
        <button id="next" type="button">▶︎</button>

        <!-- optional (nur wenn dein app.js diese IDs erwartet):
        <label style="display:flex;gap:6px;align-items:center">
          <input id="showIntegrated" type="checkbox" checked> integrated
        </label>
        <label style="display:flex;gap:6px;align-items:center">
          <input id="showGrid" type="checkbox" checked> grid
        </label>
        <label style="display:flex;gap:6px;align-items:center">
          <input id="shadeCheapest" type="checkbox" checked> günstigste 4h markieren
        </label>
        -->
      </div>

      <div class="kpis">
        <div class="kpi"><b>Günstigste 4h:</b><div id="kpiWindow">–</div></div>
        <div class="kpi"><b>Ø Preis:</b><div id="kpiAvg">–</div></div>
        <div class="kpi"><b>Min / Max:</b><div id="kpiMinMax">–</div></div>
      </div>

      <div class="chartWrap">
        <canvas id="chart"></canvas>
      </div>

      <details>
        <summary>Debug</summary>
        <pre id="debug"></pre>
      </details>
    </div>
  </div>

  <!-- App (muss ganz am Schluss geladen werden) -->
  <script src="app.js"></script>
</body>
</html>
