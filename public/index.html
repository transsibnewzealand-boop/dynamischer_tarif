<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dynamische Tarife</title>

  <!-- Styling (deine Datei public/styles.css) -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Chart.js (muss vor app.js geladen sein) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
  <header class="topbar">
    <div class="shell">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <span class="dot dot1"></span><span class="dot dot2"></span><span class="dot dot3"></span>
        </div>
        <div class="brandtext">
          <div class="brandname">Dynamische Tarife</div>
          <div class="brandsub">Dynamischer Tarif vs. Standard Tarif</div>
        </div>
      </div>
      <div class="badge">Beta</div>
    </div>
  </header>

  <main class="shell">
    <section class="card">
      <div class="controls">
        <div class="field">
          <label for="date">Datum</label>
          <input id="date" type="date" />
        </div>

        <div class="row">
          <button id="load" class="btn primary" type="button">Werte laden</button>
          <button id="today" class="btn" type="button">Heute</button>
          <button id="prev" class="btn" type="button">◀︎</button>
          <button id="next" class="btn" type="button">▶︎</button>
        </div>

        <div class="toggles">
          <label class="toggle"><input type="checkbox" id="shadeCheapest" checked> <span>günstigste 4h markieren</span></label>
        </div>

        <div class="spacer"></div>
        <div class="status" id="status">bereit</div>
      </div>

      <div class="kpis">
        <div class="kpi"><div class="kpiLabel">Günstigste 4h (Dynamischer Tarif)</div><div class="kpiValue" id="kpiWindow">–</div></div>
        <div class="kpi"><div class="kpiLabel">Ø in günstigsten 4h</div><div class="kpiValue" id="kpiAvg">–</div></div>
        <div class="kpi"><div class="kpiLabel">Min / Max (Dynamischer Tarif)</div><div class="kpiValue" id="kpiMinMax">–</div></div>
      </div>

      <div class="chartWrap">
        <canvas id="chart"></canvas>
      </div>

      <details class="details">
        <summary>Debug</summary>
        <pre id="debug"></pre>
      </details>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
