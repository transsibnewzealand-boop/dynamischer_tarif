<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dynamische Tarife</title>

  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="shell">

  <div class="card">
    <h2>Dynamische Stromtarife</h2>

    <div class="controls">
      <input id="date" type="date" />

      <button id="load" class="primary">
        Werte laden
      </button>
    </div>

    <div class="kpis">
      <div class="kpi">
        <b>Günstigste 4h:</b>
        <div id="kpiWindow">–</div>
      </div>

      <div class="kpi">
        <b>Ø Preis:</b>
        <div id="kpiAvg">–</div>
      </div>

      <div class="kpi">
        <b>Min / Max:</b>
        <div id="kpiMinMax">–</div>
      </div>
    </div>

    <div class="chartWrap">
      <canvas id="chart"></canvas>
    </div>

    <details>
      <summary>Debug</summary>
      <pre id="debug"></pre>
    </details>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
